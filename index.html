<!doctype html>
<html lang="mn">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Баяхонгор аймгийн үнэгүй зар</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="container header">
    <div>
      <h1>Баяхонгор аймгийн үнэгүй зар</h1>
      <p class="muted">Аймагтаа зориулсан зарын энгийн платформ</p>
    </div>
    <a class="btn" href="post.html">+ Зар нэмэх</a>
  </header>

  <main class="container">
    <section class="card">
      <div class="row">
        <input id="q" class="input" placeholder="Хайх (ж: утас, байшин, ажил...)" />

        <select id="category" class="input" style="max-width:220px">
          <option value="">Бүх ангилал</option>
          <option>Үл хөдлөх</option>
          <option>Автомашин</option>
          <option>Ажлын зар</option>
          <option>Электрон</option>
          <option>Бусад</option>
        </select>

        <label class="row" style="gap:10px;align-items:center;max-width:220px">
          <input id="onlyFeatured" type="checkbox" />
          <span class="muted">Зөвхөн ⭐ онцлох</span>
        </label>

        <button id="clear" class="btn secondary">Цэвэрлэх</button>
      </div>
    </section>

    <section id="list" class="grid"></section>
  </main>

  <footer class="container footer muted">
    © <span id="year"></span> Баяхонгор аймгийн үнэгүй зар
  </footer>

  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
