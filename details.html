<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<title>Зарын дэлгэрэнгүй</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#081226;
  color:white;
  margin:0;
  padding:40px;
}

.container{
  max-width:800px;
  margin:auto;
}

h1{
  margin-bottom:20px;
}

.card{
  background:#0f1c35;
  padding:25px;
  border-radius:10px;
}

.price{
  font-size:22px;
  color:#ffd369;
  margin:10px 0;
}

.phone{
  margin-top:20px;
  font-size:18px;
}

.back{
  margin-top:30px;
  display:inline-block;
  padding:10px 20px;
  background:#1b2a4a;
  color:white;
  text-decoration:none;
  border-radius:6px;
}
</style>

</head>

<body>

<div class="container">

<h1>Зарын дэлгэрэнгүй</h1>

<div id="details" class="card">
Ачаалж байна...
</div>

<a href="index.html" class="back">← Буцах</a>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

if(!id){
 document.getElementById("details").innerHTML = "Зарын ID олдсонгүй";
}

fetch("/api/ads/" + id)
.then(res=>res.json())
.then(ad=>{

 if(!ad || ad.error){
  document.getElementById("details").innerHTML = "Зар олдсонгүй";
  return;
 }

 document.getElementById("details").innerHTML = `
   <h2>${ad.title}</h2>
   <div class="price">Үнэ: ${ad.price} ₮</div>
   <p>${ad.description || ""}</p>
   <div class="phone">Утас: ${ad.phone || "-"}</div>
 `;
})
.catch(()=>{
 document.getElementById("details").innerHTML = "Алдаа гарлаа";
});

</script>

</body>
</html>
