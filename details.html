<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<title>Зарын дэлгэрэнгүй</title>

<link rel="stylesheet" href="css/style.css">

<style>
body{
background:#071126;
color:white;
font-family:Arial;
margin:0;
padding:40px;
}

.container{
max-width:800px;
margin:auto;
}

.card{
background:#0e1c36;
padding:25px;
border-radius:10px;
}

.price{
font-size:22px;
color:#ffd369;
margin-top:10px;
}

.back{
display:inline-block;
margin-top:25px;
padding:10px 18px;
background:#1a2b4f;
border-radius:6px;
text-decoration:none;
color:white;
}
</style>

</head>

<body>

<div class="container">

<h1>Зарын дэлгэрэнгүй</h1>

<div id="details" class="card">
Ачаалж байна...
</div>

<a href="index.html" class="back">← Буцах</a>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

if(!id){
document.getElementById("details").innerHTML="Зар олдсонгүй";
}

fetch("/api/ads/"+id)
.then(res=>res.json())
.then(ad=>{

if(!ad || ad.error){
document.getElementById("details").innerHTML="Зар олдсонгүй";
return;
}

document.getElementById("details").innerHTML=`
<h2>${ad.title}</h2>
<div class="price">Үнэ: ${ad.price} ₮</div>
<p>${ad.description || ""}</p>
<p><b>Утас:</b> ${ad.phone || "-"}</p>
`;

})
.catch(()=>{
document.getElementById("details").innerHTML="Алдаа гарлаа";
});

</script>

</body>
</html>
